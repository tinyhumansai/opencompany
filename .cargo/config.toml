# LOCAL DEV ONLY — gitignored. Do not commit.
#
# Builds the embedded `openhuman_core` (the `openhuman` feature) against your
# live sibling openhuman checkout instead of the pinned `vendor/openhuman`
# submodule, so edits in ../openhuman are picked up without bumping the pin.
# CI and everyone else build against the pinned submodule (CI-correct).
#
# Safe because opencompany and openhuman main pin the same tinyagents commit
# (19dc2c4), so there is no duplicate/version conflict.
paths = ["../openhuman"]
